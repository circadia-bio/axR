<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460" width="400" height="460">
  <defs>
    <clipPath id="hexClip">
      <polygon points="200,10 380,120 380,340 200,450 20,340 20,120" />
    </clipPath>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#014370" />
      <stop offset="100%" stop-color="#1B6799" />
    </linearGradient>
    <linearGradient id="axeMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFECD4" />
      <stop offset="100%" stop-color="#FFA75D" />
    </linearGradient>
  </defs>

  <!-- Widened 5.85% horizontally (about the hex's own centre, x=200) to bring
       the outline from a 0.818 width:height ratio to the ecosystem-standard
       0.866 (root-3-over-2) hex-sticker ratio, matching luxR/zeitR/etc. -->
  <g transform="translate(200,0) scale(1.0585,1) translate(-200,0)">

  <!-- Hex border -->
  <polygon points="200,6 384,118 384,342 200,454 16,342 16,118"
           fill="none" stroke="#9BDFE2" stroke-width="14" />

  <g clip-path="url(#hexClip)">
    <polygon points="200,10 380,120 380,340 200,450 20,340 20,120" fill="url(#bgGrad)" />

    <!-- scattered "ore" / data points being unearthed -->
    <circle cx="300" cy="150" r="3"   fill="#9BDFE2" opacity="0.7"/>
    <circle cx="130" cy="330" r="2.5" fill="#FFECD4" opacity="0.6"/>
    <circle cx="90"  cy="170" r="2.5" fill="#FFECD4" opacity="0.5"/>
    <circle cx="330" cy="300" r="3"   fill="#9BDFE2" opacity="0.7"/>
    <circle cx="270" cy="370" r="2"   fill="#FC544A" opacity="0.7"/>
    <circle cx="150" cy="120" r="2"   fill="#FC544A" opacity="0.5"/>

    <!-- ground line -->
    <path d="M20,325 Q200,295 380,325 L380,450 L20,450 Z" fill="#014370" opacity="0.55"/>
    <path d="M20,325 Q200,295 380,325" fill="none" stroke="#1B6799" stroke-width="3" opacity="0.8"/>

    <!-- Pixel-art pickaxe silhouette, mirrored horizontally, recoloured.
         Local x-scale counter-adjusted (-9 -> -8.4979) to cancel out the
         1.0585 horizontal widening above, so the blocky pixel art stays
         perfectly square instead of stretching into rectangles. -->
    <g transform="translate(299,101) scale(-8.4979,9)">
      <path d="M8 2H11V3H13V4H15V5H17V7H18V9H19V11H20V14H18V12H17V11H16V10H14V9H13V8H12V6H11V5H10V4H8M11 9H12V10H13V11H12V12H11V13H10V14H9V15H8V16H7V17H6V18H5V19H4V20H3V21H2V20H1V19H2V18H3V17H4V16H5V15H6V14H7V13H8V12H9V11H10V10H11"
            fill="url(#axeMetal)" stroke="#FC544A" stroke-width="0.6" stroke-linejoin="miter"/>
    </g>

    <!-- glint near blade tip -->
    <g stroke="#FFECD4" stroke-width="2" opacity="0.85">
      <line x1="103" y1="203" x2="103" y2="217"/>
      <line x1="96"  y1="210" x2="110" y2="210"/>
    </g>
  </g>

  <!-- Converted to vector paths (Liberation Sans Bold outlines, extracted via
       fontTools) instead of a live <text> element. Same cairosvg
       text-anchor="middle" multi-tspan bug found in hypnoR was confirmed
       here too (measured centre was x=219 instead of x=200). Paths are
       hand-centred and immune to any renderer/font quirk. -->
  <g>
    <path transform="translate(158.642,365) scale(0.021484,-0.021484)" d="M393 -20Q236 -20 148.0 65.5Q60 151 60 306Q60 474 169.5 562.0Q279 650 487 652L720 656V711Q720 817 683.0 868.5Q646 920 562 920Q484 920 447.5 884.5Q411 849 402 767L109 781Q136 939 253.5 1020.5Q371 1102 574 1102Q779 1102 890.0 1001.0Q1001 900 1001 714V320Q1001 229 1021.5 194.5Q1042 160 1090 160Q1122 160 1152 166V14Q1127 8 1107.0 3.0Q1087 -2 1067.0 -5.0Q1047 -8 1024.5 -10.0Q1002 -12 972 -12Q866 -12 815.5 40.0Q765 92 755 193H749Q631 -20 393 -20ZM720 501 576 499Q478 495 437.0 477.5Q396 460 374.5 424.0Q353 388 353 328Q353 251 388.5 213.5Q424 176 483 176Q549 176 603.5 212.0Q658 248 689.0 311.5Q720 375 720 446Z" fill="#FFECD4"/>
    <path transform="translate(184.112,365) scale(0.021484,-0.021484)" d="M819 0 567 392 313 0H14L410 559L33 1082H336L567 728L797 1082H1102L725 562L1124 0Z" fill="#FFECD4"/>
    <path transform="translate(209.583,365) scale(0.021484,-0.021484)" d="M1105 0 778 535H432V0H137V1409H841Q1093 1409 1230.0 1300.5Q1367 1192 1367 989Q1367 841 1283.0 733.5Q1199 626 1056 592L1437 0ZM1070 977Q1070 1180 810 1180H432V764H818Q942 764 1006.0 820.0Q1070 876 1070 977Z" fill="#FC544A"/>
  </g>

  </g>
</svg>
