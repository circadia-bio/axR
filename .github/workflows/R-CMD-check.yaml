on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: R CMD CHECK

jobs:
  check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: macos-latest,  r: 'release'}
          - {os: windows-latest, r: 'release'}

    steps:
      - uses: actions/checkout@v4

      # axR vendors OMAPI (src/omapi), which needs libudev for device
      # discovery on Linux -- see DESCRIPTION's SystemRequirements. Not
      # something r-lib/actions/setup-r-dependencies auto-detects from a
      # prose SystemRequirements field, so installed explicitly here.
      - name: Install system dependencies (Linux)
        if: matrix.config.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Ensure configure/cleanup are executable
        if: matrix.config.os != 'windows-latest'
        run: chmod +x configure cleanup

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
